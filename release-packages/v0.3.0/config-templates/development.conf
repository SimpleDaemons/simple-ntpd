listen_address=127.0.0.1
listen_port=123
worker_threads=2
max_connections=256
max_packet_size=1024
stratum=2
reference_id=DEVC
reference_clock=LOCAL
sync_interval=60
timeout=1000
enable_statistics=true
stats_interval=30
enable_console_logging=true
enable_syslog=false
log_level=0
log_json=true
log_file=./logs/simple-ntpd-dev.log
log_max_size_bytes=10485760
log_max_files=5
enable_authentication=false
authentication_algorithm=none
enable_acl=false
restrict_queries=false
enable_rate_limiting=true
connection_rate_limit_per_minute=120
request_rate_limit_per_minute=600
enable_ddos_protection=true
ddos_anomaly_threshold_per_second=80
enable_tls=false
enable_certificate_validation=false
enable_certificate_authentication=false
enable_leap_second_handling=false
enable_automatic_failover=false
enable_self_healing=true
enable_graceful_degradation=true
degradation_mode=reduced
enable_state_persistence=true
state_file=./state/simple-ntpd-dev-state.json
backup_config_file=./state/simple-ntpd-dev-config.backup
service_restart_limit=3
upstream_selection_algorithm=round_robin
enable_upstream_load_balancing=true
enable_upstream_failover=true
enable_dynamic_stratum_adjustment=true
enable_reference_clock_support=true
reference_clock_source=local
