listen_address=0.0.0.0
listen_port=123
worker_threads=4
max_connections=2000
max_packet_size=1024
stratum=2
reference_id=SECU
reference_clock=LOCAL
sync_interval=32
timeout=500
enable_statistics=true
stats_interval=15
enable_console_logging=false
enable_syslog=true
log_level=1
log_json=true
log_file=/var/log/simple-ntpd/simple-ntpd-security.log
log_max_size_bytes=104857600
log_max_files=20
enable_authentication=true
authentication_key=replace-with-strong-secret
restrict_queries=true
allowed_clients=10.10.0.0/16
denied_clients=0.0.0.0/0
enable_leap_second_handling=true
leap_second_file=/var/lib/simple-ntpd/leap-seconds.list
