listen_address=0.0.0.0
listen_port=123
worker_threads=4
max_connections=2000
max_packet_size=1024
stratum=2
reference_id=SECU
reference_clock=LOCAL
sync_interval=32
timeout=500
enable_statistics=true
stats_interval=15
enable_console_logging=false
enable_syslog=true
log_level=1
log_json=true
log_file=/var/log/simple-ntpd/simple-ntpd-security.log
log_max_size_bytes=104857600
log_max_files=20
enable_authentication=true
authentication_key=replace-with-strong-secret
authentication_algorithm=sha256
enable_acl=true
restrict_queries=true
allowed_clients=10.10.0.0/16
denied_clients=0.0.0.0/0
enable_rate_limiting=true
connection_rate_limit_per_minute=120
request_rate_limit_per_minute=300
enable_ddos_protection=true
ddos_anomaly_threshold_per_second=120
enable_tls=true
enable_certificate_validation=true
enable_certificate_authentication=true
tls_cert_file=/etc/simple-ntpd/tls/server.crt
tls_key_file=/etc/simple-ntpd/tls/server.key
tls_ca_file=/etc/simple-ntpd/tls/ca.crt
enable_leap_second_handling=true
leap_second_file=/var/lib/simple-ntpd/leap-seconds.list
enable_automatic_failover=true
enable_self_healing=true
enable_graceful_degradation=true
degradation_mode=prioritize_trusted
enable_state_persistence=true
state_file=/var/lib/simple-ntpd/high-security-state.json
backup_config_file=/var/lib/simple-ntpd/high-security-config.backup
service_restart_limit=3
upstream_selection_algorithm=least_errors
enable_upstream_load_balancing=true
enable_upstream_failover=true
enable_dynamic_stratum_adjustment=true
enable_reference_clock_support=true
reference_clock_source=atomic
