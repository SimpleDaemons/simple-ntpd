listen_address=0.0.0.0
listen_port=123
worker_threads=8
max_connections=5000
max_packet_size=1024
stratum=2
reference_id=PROD
reference_clock=LOCAL
sync_interval=64
timeout=1000
enable_statistics=true
stats_interval=60
enable_console_logging=false
enable_syslog=true
log_level=1
log_json=true
log_file=/var/log/simple-ntpd/simple-ntpd.log
log_max_size_bytes=52428800
log_max_files=10
enable_authentication=true
authentication_key=change-me
restrict_queries=true
allowed_clients=10.0.0.0/8,192.168.0.0/16
enable_leap_second_handling=true
leap_second_file=/var/lib/simple-ntpd/leap-seconds.list
