listen_address=127.0.0.1
listen_port=123
worker_threads=2
max_connections=256
max_packet_size=1024
stratum=2
reference_id=DEVC
reference_clock=LOCAL
sync_interval=60
timeout=1000
enable_statistics=true
stats_interval=30
enable_console_logging=true
enable_syslog=false
log_level=0
log_json=true
log_file=./logs/simple-ntpd-dev.log
log_max_size_bytes=10485760
log_max_files=5
enable_authentication=false
restrict_queries=false
enable_leap_second_handling=false
